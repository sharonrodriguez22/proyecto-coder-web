<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sociedad Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- Css Propio-->
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <header>
        <a href="../index.html"><img src="../img/logo1.svg" alt="Logo de casa con un perrito adentro"></a>
        
        <nav>
            <ul class="lista-header">
                <li><a href="../index.html">Home</a></li>
                <li><a href="./servicios.html"> Servicios </a> </li>
                <li><a href="./adopciones.html"> Adopciones </a> </li>
                <li><a href="./sucursales.html"> Sucursales </a> </li>
                <li><a href="#"> Contacto </a> </li>
            </ul>
        </nav>

    </header>

 

    <main>
      <h1 class="titulo-grid">Contacto</h1>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon1">Nombre</span>
        <input type="text" class="form-control" placeholder="Nombre y Apellido" aria-label="Username" aria-describedby="basic-addon1">
      </div>

      <div class="input-group mb-3">
        <input type="text" class="form-control" placeholder="Email" aria-label="Recipient’s username" aria-describedby="basic-addon2">
        <span class="input-group-text" id="basic-addon2">@example.com</span>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text">Asunto</span>
        <input type="text" class="form-control" aria-label="Amount (to the nearest dollar)">
      </div>

      <div class="input-group">
        <span class="input-group-text">Mensaje</span>
        <textarea class="form-control" aria-label="With textarea"></textarea>
      </div>


      <button class="card__boton">Enviar</button>

    </main>


    <footer>
      <p>Seguinos en nuestras redes</p>
      <img class="logo-fb" src="../img/logo-fb.svg" alt="logo facebook">
      <img class="logo-ig" src="../img/logo-ig.svg" alt="logo instagram">
      <img class="logo-wp" src="../img/logo-wp.svg" alt="logo whatsapp">
    </footer>

    <!-- JS de BS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
